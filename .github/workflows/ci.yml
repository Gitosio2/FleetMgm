name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# actions/checkout and actions/setup-java are pinned to version tags (@v4) for now.
# Pinning to an exact commit SHA (A03:2025 supply-chain hardening) is deferred to
# Hito 41 (Demo y hardening final) — see planning.md.

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw -B test

  owasp-dependency-check:
    name: OWASP Dependency-Check (fails on CVSS >= 7)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw -B dependency-check:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  # TODO(Hito 13+): no package.json defines a `test` script yet, so `turbo run test`
  # currently skips every workspace and this job always reports success without
  # testing anything. Remove this TODO once real tests land and the job becomes a
  # meaningful gate.
  frontend-test:
    name: Frontend tests (turbo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx turbo run test --filter='./packages/*' --filter='./apps/web'

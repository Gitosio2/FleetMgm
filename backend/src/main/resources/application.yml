spring:
  application:
    name: fleetmgm-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleetmgm}
    username: ${SPRING_DATASOURCE_USERNAME:fleetmgm}
    password: ${SPRING_DATASOURCE_PASSWORD:fleetmgm}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:changeme-changeme-changeme-changeme-changeme-changeme-changeme-changeme}
  access-token-expiration-ms: 900000      # 15 min
  refresh-token-expiration-ms: 604800000  # 7 days

workshop:
  auto-create-schedule-on-maintenance-create: ${WORKSHOP_AUTO_CREATE_SCHEDULE:true}

billing:
  default-tax-rate: ${BILLING_DEFAULT_TAX_RATE:0.2100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.fleetmgm: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: demo

  # V20__seed_demo_data.sql lives in db/seed, NOT db/migration, precisely so it never runs for
  # @DataJpaTest/@SpringBootTest (which apply classpath:db/migration only, per the default
  # spring.flyway.locations at the top of this file). Discovered the hard way: with the seed file
  # under db/migration, every @DataJpaTest got Flyway-seeded with 69 client invoices numbered
  # INV-2026-00001..00069, colliding with repository tests that hardcode small literal invoice
  # numbers as fixtures (LineItemRepositoryTest, ProfitabilityRepositoryTest, etc. all failed with
  # "duplicate key value violates unique constraint uq_invoices_number"). This profile is additive
  # (extends, not replaces, spring.flyway.locations) and is only activated for the docker-compose
  # demo (SPRING_PROFILES_ACTIVE=prod,demo) — never in tests or CI.
  flyway:
    locations: classpath:db/migration,classpath:db/seed

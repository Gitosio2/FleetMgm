name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# All actions/* steps are pinned to an exact commit SHA, not a mutable version tag
# (A03:2025 supply-chain hardening — a tag like @v4 can be re-pointed by anyone with
# write access to that action's repo). The `# vX.Y.Z` comment is the human-readable
# label for that commit; it has no functional effect, GitHub Actions only reads the SHA.

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw -B test

  backend-integration-test:
    name: Backend integration tests (Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw -B verify -Pfailsafe

  owasp-dependency-check:
    name: OWASP Dependency-Check (fails on CVSS >= 7)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # The NVD database (~500MB+, 360k+ CVE records) is NOT covered by the `cache: maven` step
      # above — it lives outside ~/.m2 by default. Without this, dependency-check re-downloads
      # the full database on every single run (observed: 2-4 hours per PR). Keyed by ISO week so
      # it still periodically refreshes; restore-keys falls back to the latest available cache so
      # a new week only pays for the incremental NVD update, not a full re-sync.
      - name: Compute cache week key
        id: cache-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"
      - name: Cache OWASP dependency-check NVD data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: backend/.owasp-dc-data
          key: owasp-dc-data-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            owasp-dc-data-
      - run: ./mvnw -B dependency-check:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  # TODO(Hito 13+): no package.json defines a `test` script yet, so `test` is a no-op
  # per workspace until real tests land. `build`/`lint` are the real gate for now —
  # they already catch broken TypeScript/Vite changes.
  frontend-test:
    name: Frontend tests (turbo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx turbo run build lint test --filter='./packages/*' --filter='./apps/web'

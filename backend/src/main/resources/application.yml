spring:
  application:
    name: fleetmgm-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleetmgm}
    username: ${SPRING_DATASOURCE_USERNAME:fleetmgm}
    password: ${SPRING_DATASOURCE_PASSWORD:fleetmgm}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:changeme-changeme-changeme-changeme-changeme-changeme-changeme-changeme}
  access-token-expiration-ms: 900000      # 15 min
  refresh-token-expiration-ms: 604800000  # 7 days

workshop:
  auto-create-schedule-on-maintenance-create: ${WORKSHOP_AUTO_CREATE_SCHEDULE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.fleetmgm: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false
